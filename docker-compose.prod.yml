services:

  postgres:
    image: postgres:16-alpine
    container_name: login_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${DB_NAME:-logindb}
      POSTGRES_USER:     ${DB_USER:-loginuser}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-loginuser} -d ${DB_NAME:-logindb}"]
      interval: 10s
      timeout: 5s
      retries: 5

  login-service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: login_service
    restart: unless-stopped
    environment:
      DB_URL:               jdbc:postgresql://postgres:5432/${DB_NAME:-logindb}
      DB_USER:              ${DB_USER:-loginuser}
      DB_PASSWORD:          ${DB_PASSWORD}
      DB_DRIVER:            org.postgresql.Driver
      DDL_AUTO:             update
      JWT_SECRET:           ${JWT_SECRET}
      JWT_EXPIRATION_MS:    ${JWT_EXPIRATION_MS:-86400000}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS}
    expose:
      - "8080"
    depends_on:
      postgres:
        condition: service_healthy

  apache:
    image: httpd:2.4-alpine
    container_name: login_apache
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      # Configuración de producción con TLS
      - ./src/main/resources/apache/httpd.prod.conf:/usr/local/apache2/conf/httpd.conf:ro
      # Frontend estático
      - ./frontend:/usr/local/apache2/htdocs:ro
      # Certificados Let's Encrypt del host montados como read-only
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - /var/lib/letsencrypt:/var/lib/letsencrypt:ro
    depends_on:
      - login-service

volumes:
  postgres_data:
